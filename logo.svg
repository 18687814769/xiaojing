<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 六边形外框 -->
  <polygon points="100,20 173,60 173,140 100,180 27,140 27,60" 
           fill="none" stroke="url(#grad1)" stroke-width="8" filter="url(#glow)" />
  
  <!-- 中心核心 (代表小景的心) -->
  <circle cx="100" cy="100" r="30" fill="url(#grad1)" filter="url(#glow)">
    <animate attributeName="r" values="30;35;30" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- 内部文字/符号 -->
  <text x="100" y="108" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">XJ</text>
  
  <!-- 环绕的数据点 -->
  <circle cx="100" cy="20" r="4" fill="#6366f1">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" repeatCount="indefinite" />
  </circle>
  <circle cx="173" cy="60" r="3" fill="#a855f7">
    <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="8s" repeatCount="indefinite" />
  </circle>
  <circle cx="27" cy="140" r="3" fill="#6366f1">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="12s" repeatCount="indefinite" />
  </circle>
</svg>
